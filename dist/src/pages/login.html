<!DOCTYPE html>
<html lang="es" data-lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicio de Sesión - SMAI</title>
  <script type="module" crossorigin src="/SIstema-Monitoreo-Ambiental/assets/login-CoCx_U3q.js"></script>
  <link rel="modulepreload" crossorigin href="/SIstema-Monitoreo-Ambiental/assets/main-Bi6ICiqU.js">
  <link rel="stylesheet" crossorigin href="/SIstema-Monitoreo-Ambiental/assets/main-BD7aTh0w.css">
</head>
<body>
  <a href="#main" class="skip-link" data-i18n="skip">Saltar al contenido principal</a>
  <header class="app-header">
    <h1><span aria-hidden="true">🌿</span> Monitoreo Ambiental Inteligente</h1>
    <nav aria-label="Main navigation"></nav>
    <a href="../../index.html" class="px-4 py-1.5 rounded text-sm font-semibold no-underline bg-white/20 text-white hover:bg-white/30 transition-all duration-150" data-i18n="login.back">Volver al inicio</a>
  </header>
  <main id="main" class="flex items-center justify-center flex-1 px-4 py-8">
    <div class="bg-white border border-border rounded-lg p-6 w-full max-w-md shadow-sm">
      <figure class="text-center mb-4">
        <img src="/SIstema-Monitoreo-Ambiental/assets/logo-smai-BbPpsd0m.png" alt="SMAI — Monitoreo Ambiental Inteligente" width="80" height="80" class="rounded-full mx-auto shadow-sm">
        <figcaption class="text-xs text-muted mt-1" data-i18n="portal.short">SMAI — Monitoreo Ambiental Inteligente</figcaption>
      </figure>
      <h2 class="text-center text-xl font-bold mb-6 text-primary" data-i18n="login.title">Iniciar Sesión</h2>
      <form id="loginForm" novalidate>
        <div class="mb-4">
          <label for="email" class="block mb-1 font-semibold text-sm" data-i18n="login.email">Correo electrónico</label>
          <input type="email" id="email" name="email" placeholder="usuario@ejemplo.com" data-i18n-attr="placeholder:login.email.placeholder" required autocomplete="username" class="w-full px-3 py-2.5 border-2 border-[#6b7b96] rounded text-sm transition-colors focus:outline-2 focus:outline-primary focus:outline-offset-1">
        </div>
        <div class="mb-4">
          <label for="password" class="block mb-1 font-semibold text-sm" data-i18n="login.password">Contraseña</label>
          <input type="password" id="password" name="password" placeholder="Ingrese su contraseña" data-i18n-attr="placeholder:login.password.placeholder" required autocomplete="current-password" class="w-full px-3 py-2.5 border-2 border-[#6b7b96] rounded text-sm transition-colors focus:outline-2 focus:outline-primary focus:outline-offset-1">
        </div>
        <div class="mb-4">
          <label for="rol" class="block mb-1 font-semibold text-sm" data-i18n="login.role">Rol de acceso (demo)</label>
          <select id="rol" required class="w-full px-3 py-2.5 border-2 border-[#6b7b96] rounded text-sm transition-colors focus:outline-2 focus:outline-primary focus:outline-offset-1">
            <option value="admin" data-i18n="login.role.admin">Administrador del Sistema</option>
            <option value="consultor" data-i18n="login.role.consultor">Consultor / Responsable Ambiental</option>
            <option value="tecnico" data-i18n="login.role.tecnico">Técnico de Campo</option>
          </select>
        </div>
        <div id="loginError" class="px-4 py-3 rounded text-sm bg-red-100 text-red-900 border border-red-300 hidden" role="alert"></div>
        <button type="submit" class="btn-primary w-full mt-3" data-tooltip="Presione para ingresar al sistema con sus credenciales" data-i18n="login.submit" data-i18n-attr="data-tooltip:login.submit.tooltip">Ingresar</button>
      </form>
      <p class="text-center mt-3 text-xs text-muted" data-i18n="login.demo">
        Demo: seleccione su rol y presione Ingresar.
      </p>
    </div>
  </main>
  <footer class="bg-white border-t border-border px-6 py-4 text-center text-xs text-muted">
    <p><span data-i18n="footer.copy">SMAI</span> &copy; 2026 | <a href="sitemap.html" class="text-primary font-semibold no-underline hover:underline">Mapa del Sitio</a>
  </footer>

</body>
</html>
