<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicio de Sesión - SMAI</title>
  <link rel="stylesheet" href="/src/css/style.css">
</head>
<body>
  <a href="#main" class="skip-link">Saltar al contenido principal</a>
  <header class="app-header">
    <h1><span aria-hidden="true">🌿</span> Monitoreo Ambiental Inteligente</h1>
    <nav aria-label="Navegación principal"></nav>
    <a href="/index.html" class="px-4 py-1.5 rounded text-sm font-semibold no-underline bg-white/20 text-white hover:bg-white/30 transition-all duration-150">Volver al inicio</a>
  </header>
  <main id="main" class="flex items-center justify-center min-h-[70vh] px-4 py-8">
    <div class="bg-white border border-border rounded-lg p-6 w-full max-w-md shadow-sm">
      <figure class="text-center mb-4">
        <img src="/assets/img/logo-smai.png" alt="SMAI — Monitoreo Ambiental Inteligente" width="80" height="80" class="rounded-full mx-auto shadow-sm">
        <figcaption class="text-xs text-muted mt-1">SMAI — Monitoreo Ambiental Inteligente</figcaption>
      </figure>
      <h2 class="text-center text-xl font-bold mb-6 text-primary">Iniciar Sesión</h2>
      <form id="loginForm" novalidate>
        <div class="mb-4">
          <label for="email" class="block mb-1 font-semibold text-sm">Correo electrónico</label>
          <input type="email" id="email" name="email" placeholder="usuario@ejemplo.com" required autocomplete="username" class="w-full px-3 py-2.5 border-2 border-[#6b7b96] rounded text-sm transition-colors focus:outline-2 focus:outline-primary focus:outline-offset-1">
        </div>
        <div class="mb-4">
          <label for="password" class="block mb-1 font-semibold text-sm">Contraseña</label>
          <input type="password" id="password" name="password" placeholder="Ingrese su contraseña" required autocomplete="current-password" class="w-full px-3 py-2.5 border-2 border-[#6b7b96] rounded text-sm transition-colors focus:outline-2 focus:outline-primary focus:outline-offset-1">
        </div>
        <div class="mb-4">
          <label for="rol" class="block mb-1 font-semibold text-sm">Rol de acceso (demo)</label>
          <select id="rol" required class="w-full px-3 py-2.5 border-2 border-[#6b7b96] rounded text-sm transition-colors focus:outline-2 focus:outline-primary focus:outline-offset-1">
            <option value="admin">Administrador del Sistema</option>
            <option value="consultor">Consultor / Responsable Ambiental</option>
            <option value="tecnico">Técnico de Campo</option>
          </select>
        </div>
        <div id="loginError" class="px-4 py-3 rounded text-sm bg-red-100 text-red-900 border border-red-300 hidden" role="alert"></div>
        <button type="submit" class="btn-primary w-full mt-3" data-tooltip="Presione para ingresar al sistema con sus credenciales">Ingresar</button>
      </form>
      <p class="text-center mt-3 text-xs text-muted">
        Demo: seleccione su rol y presione Ingresar.
      </p>
    </div>
  </main>
  <footer class="bg-white border-t border-border px-6 py-4 text-center text-xs text-muted">
    <p>SMAI &copy; 2026 | <a href="sitemap.html" class="text-primary font-semibold no-underline hover:underline">Mapa del Sitio</a></p>
  </footer>

  <script type="module">
    import Alpine from '/src/js/main.js';
    import { isLoggedIn, getUser, login } from '/src/js/auth.js';

    if (isLoggedIn()) {
      const user = getUser();
      const roleHome = { admin: '/src/pages/dashboard.html', consultor: '/src/pages/consulta-datos.html', tecnico: '/src/pages/lecturas-manuales.html' };
      window.location.href = roleHome[user.role] || '/src/pages/dashboard.html';
    } else {
      Alpine.start();
      document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const pass = document.getElementById('password').value.trim();
        const rol = document.getElementById('rol').value;
        const err = document.getElementById('loginError');
        if (!email) { err.textContent = 'Ingrese su correo electrónico. Ej: usuario@dominio.com'; err.classList.remove('hidden'); return; }
        if (!pass) { err.textContent = 'Ingrese su contraseña.'; err.classList.remove('hidden'); return; }
        if (!email.includes('@')) { err.textContent = 'El correo debe contener un @, ej: usuario@dominio.com'; err.classList.remove('hidden'); return; }
        err.classList.add('hidden');
        login(email, rol);
        window.showNotification('Sesión iniciada como ' + rol + '. Bienvenido.', 'success');
        const roleHome = { admin: '/src/pages/dashboard.html', consultor: '/src/pages/consulta-datos.html', tecnico: '/src/pages/lecturas-manuales.html' };
        setTimeout(() => { window.location.href = roleHome[rol] || '/src/pages/dashboard.html'; }, 1000);
      });
    }
  </script>
</body>
</html>
